<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Profesores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-success m-0">Control de Profesores</h2>
            <div>
                <a href="/profesores/nuevo/" class="btn btn-success fw-bold">+ Registrar Profesor</a>
                <a href="/" class="btn btn-secondary fw-bold">← Volver al Inicio</a>
            </div>
        </div>

        <div class="card shadow-sm border-0 mb-5">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark text-white">
                        <tr>
                            <th class="ps-4 py-3">Nómina</th>
                            <th class="py-3">Nombre Completo</th>
                            <th class="py-3">Correo Electrónico</th>
                            <th class="text-center py-3" style="width: 220px;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for p in profesores %}
                        <tr>
                            <td class="ps-4 fw-bold text-uppercase">{{ p.nomina }}</td>
                            
                            <td>{{ p.nombre }} {{ p.apellidos }}</td>
                            
                            <td>{{ p.email }}</td>
                            <td class="text-center align-middle">
    <div class="d-flex justify-content-center gap-2">
        <a href="/profesores/editar/{{ p.id }}/" class="btn btn-sm btn-warning fw-bold text-dark px-3 shadow-sm">✏️ Editar</a>
        <a href="/profesores/eliminar/{{ p.id }}/" class="btn btn-sm btn-danger fw-bold text-white px-3 shadow-sm" 
         onclick="return confirm('¿Estás seguro de que deseas eliminar a {{ p.nombre }} {{ p.apellidos }}?');"> 🗑️ Eliminar
</a>
        
    </div>
    </td>
                            
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="4" class="text-center text-muted py-4">No hay profesores registrados actualmente.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</body>
</html>
