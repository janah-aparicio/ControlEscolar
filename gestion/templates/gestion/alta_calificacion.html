<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% if calificacion %}Editar{% else %}Asignar{% endif %} Calificación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-primary text-white py-3">
                <h4 class="m-0 fw-bold">{% if calificacion %}✏️ Editar{% else %}➕ Asignar{% endif %} Calificación</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Estudiante</label>
                        <select name="estudiante" class="form-select" required {% if calificacion %}disabled{% endif %}>
                            <option value="">-- Selecciona un estudiante --</option>
                            {% for e in estudiantes %}
                                <option value="{{ e.id }}" {% if calificacion.estudiante.id == e.id %}selected{% endif %}>
                                    {{ e.nombre }} {{ e.apellido }}
                                </option>
                            {% endfor %}
                        </select>
                        {% if calificacion %}
                            <input type="hidden" name="estudiante" value="{{ calificacion.estudiante.id }}">
                        {% endif %}
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Materia / Clase</label>
                        <select name="materia" class="form-select" required {% if calificacion %}disabled{% endif %}>
                            <option value="">-- Selecciona una materia --</option>
                            {% for m in materias %}
                                <option value="{{ m.id }}" {% if calificacion.materia.id == m.id %}selected{% endif %}>
                                    {{ m.nombre }}
                                </option>
                            {% endfor %}
                        </select>
                        {% if calificacion %}
                            <input type="hidden" name="materia" value="{{ calificacion.materia.id }}">
                        {% endif %}
                    </div>

                    <div class="mb-4">
                       <label class="form-label fw-bold">Calificación Final</label>
                     <input type="number" step="0.1" min="0" max="100" name="nota" class="form-control" 
                      value="{% if calificacion %}{{ calificacion.nota }}{% endif %}" 
                       placeholder="Ej: 95.5" required>
                    </div>

                    <div class="d-flex justify-content-end gap-2">
                        <a href="/calificaciones/" class="btn btn-secondary fw-bold">Cancelar</a>
                        <button type="submit" class="btn btn-primary fw-bold">Guardar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
