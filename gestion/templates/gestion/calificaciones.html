<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Calificaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold m-0">Control de Calificaciones</h2>
            <div>
                <a href="/calificaciones/nueva/" class="btn btn-primary fw-bold">+ Asignar Calificación</a>
                <a href="/" class="btn btn-secondary fw-bold">← Volver al Inicio</a>
            </div>
        </div>

        <div class="card shadow-sm border-0 mb-5">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-primary text-dark">
                        <tr>
                            <th class="ps-3 py-3">Estudiante</th>
                            <th class="py-3">Materia / Clase</th>
                            <th class="py-3">Calificación Final</th>
                            <th class="text-center py-3" style="width: 220px;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for c in calificaciones %}
                        <tr>
                            <td class="ps-3 fw-bold">{{ c.estudiante }}</td>
                            <td>{{ c.materia }}</td>
                            <td>
                                <span class="badge bg-success fs-6 px-3 py-2 text-white" style="font-weight: bold; display: inline-block; min-width: 45px;">
                                    {{ c.nota }}
                                </span>
                            </td>
                            <td class="text-center">
                                <a href="/calificaciones/editar/{{ c.id }}/" class="btn btn-sm btn-warning fw-bold text-dark me-1">✏️ Editar</a>
                                <a href="/calificaciones/eliminar/{{ c.id }}/" 
                                   class="btn btn-sm btn-danger fw-bold text-white" 
                                   onclick="return confirm('¿Estás seguro de que deseas eliminar la calificación de {{ c.estudiante }}?');">
                                   🗑️ Eliminar
                                </a>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="4" class="text-center text-muted py-4">No hay calificaciones registradas actualmente.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</body>
</html>
