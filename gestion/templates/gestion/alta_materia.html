<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% if materia %}Editar{% else %}Registrar{% endif %} Materia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5" style="max-width: 600px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-dark fw-bold">
                {% if materia %}✏️ Editar Materia{% else %}➕ Registrar Materia{% endif %}
            </h2>
            <a href="/materias/" class="btn btn-secondary">Cancelar</a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form action="" method="POST" id="formMateria">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Clave de la Materia</label>
                        <input type="text" name="clave" class="form-control" placeholder="Ej: 10ALGE" required
                               value="{{ materia.clave|default:'' }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre de la Materia</label>
                        <input type="text" name="nombre" class="form-control" placeholder="Ej: Algebra Lineal" required
                               value="{{ materia.nombre|default:'' }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Créditos</label>
                        <input type="number" name="creditos" class="form-control" placeholder="Ej: 4" required
                               value="{{ materia.creditos|default:'' }}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Carrera</label>
                        <select name="carrera" class="form-select" required>
                            <option value="" disabled {% if not materia %}selected{% endif %}>
                                Seleccione una carrera...
                            </option>
                            
                            {% for c in carreras %}
                                <option value="{{ c.id }}" {% if materia and materia.carrera_id == c.id %}selected{% endif %}>
                                    {{ c.nombre }}
                                </option>
                            {% empty %}
                                <option value="" disabled>No hay carreras registradas</option>
                            {% endfor %}
                        </select>
                    </div>

                    <button type="submit" class="btn btn-info text-white w-100 mt-3 fw-bold">Guardar Materia</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
