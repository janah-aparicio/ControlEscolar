<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Materias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-warning text-dark">Control de Materias</h2>
            <a href="/materias/nueva/" class="btn btn-warning text-dark fw-bold me-2">+ Registrar Materia</a>
            <a href="/" class="btn btn-secondary">← Volver al Inicio</a>
        </div>
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                 <table class="table table-hover align-middle">
    <thead class="table-dark">
        <tr>
            <th>Clave</th>
            <th>Materia</th>
            <th>Créditos</th>
            <th>Carrera</th>
            <th class="text-center">Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for m in materias %}
        <tr>
            <td>{{ m.clave }}</td>
            <td>{{ m.nombre }}</td>
            <td>{{ m.creditos }}</td>
            <td><span class="badge bg-info">{{ m.carrera.nombre }}</span></td>
            <td class="text-center">
                <div class="d-flex justify-content-center gap-2">
                    <a href="/materias/editar/{{ m.id }}/" class="btn btn-sm btn-warning fw-bold text-dark px-3 shadow-sm">✏️ Editar</a>
                    <a href="/materias/eliminar/{{ m.id }}/" class="btn btn-sm btn-danger fw-bold text-white px-3 shadow-sm" 
                       onclick="return confirm('¿Eliminar la materia {{ m.nombre }}?');">🗑️ Eliminar</a>
                </div>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

                
            </div>
        </div>
    </div>
</body>
</html>
