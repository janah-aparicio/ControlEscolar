<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Escolar - Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-section { background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); }
        .btn-xl { padding: 1rem 2rem; font-size: 1.25rem; border-radius: 10px; }
    </style>
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="p-5 mb-4 bg-white rounded-3 shadow-lg border">
            <div class="container-fluid py-3 text-center">
                <h1 class="display-4 fw-bold text-primary mb-3">🎓 Sistema de Control Escolar</h1>
                <p class="fs-5 text-secondary mb-4">Bienvenido al panel de gestión académica.</p>
                <hr class="my-4">
                
                <h5 class="text-uppercase text-muted mb-3">Gestión Académica</h5>
                <div class="d-flex justify-content-center gap-2 flex-wrap mb-4">
                    <a href="/estudiantes/" class="btn btn-outline-primary px-4">Estudiantes</a>
                    <a href="/profesores/" class="btn btn-outline-success px-4">Profesores</a>
                    <a href="/materias/" class="btn btn-outline-warning px-4 text-dark">Materias</a>
                    <a href="/carreras/" class="btn btn-outline-info px-4">Carreras</a>
                </div>

                <h5 class="text-uppercase text-muted mb-3">Operaciones y Espacios</h5>
                <div class="d-flex justify-content-center gap-2 flex-wrap mb-4">
                    <a href="/aulas/" class="btn btn-outline-secondary px-4">Aulas</a>
                    <a href="/grupos/" class="btn btn-outline-danger px-4">Grupos y Horarios</a>
                    <a href="/calificaciones/" class="btn btn-outline-primary" style="color: #6f42c1; border-color: #6f42c1;">Calificaciones</a>
                </div>

                <div class="mt-4 pt-4 border-top">
                    <a href="/reporte/" class="btn btn-success btn-lg text-white fw-bold shadow-sm px-5">
                        📊 GENERAR REPORTE GLOBAL Y PDF
                    </a>
                    <a href="/admin/" class="btn btn-dark btn-lg px-5 ms-3">Panel Admin</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
