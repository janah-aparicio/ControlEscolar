<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% if carrera %}Editar{% else %}Registrar{% endif %} Carrera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5" style="max-width: 600px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-dark fw-bold">
                {% if carrera %}✏️ Editar Carrera{% else %}➕ Registrar Carrera{% endif %}
            </h2>
            <a href="/carreras/" class="btn btn-secondary">Cancelar</a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form action="" method="POST" id="formCarrera">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Clave de la Carrera</label>
                        <input type="text" name="clave" class="form-control" placeholder="Ej: 1ISC" required
                               value="{% if carrera %}{{ carrera.clave }}{% endif %}">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">Nombre de la Carrera</label>
                        <input type="text" name="nombre" class="form-control" placeholder="Ej: Ingeniería en Sistemas" required
                               value="{% if carrera %}{{ carrera.nombre }}{% endif %}">
                    </div>

                    <button type="submit" class="btn btn-info text-white w-100 mt-3 fw-bold">Guardar Carrera</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('formCarrera').onsubmit = function() {
            let inputs = this.querySelectorAll('input');
            for (let i = 0; i < inputs.length; i++) {
                if (inputs[i].value.trim() === "") {
                    alert("Por favor, completa todos los campos.");
                    return false;
                }
            }
            return true;
        }
    </script>
</body>
</html>
