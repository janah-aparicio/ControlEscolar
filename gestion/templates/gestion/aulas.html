<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Aulas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-secondary">Control de Aulas (Salones)</h2>
            <div>
                <a href="/aulas/nueva/" class="btn btn-primary me-2">+ Registrar Aula</a>
                <a href="/" class="btn btn-secondary">← Volver al Inicio</a>
            </div>
        </div>
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Nombre/Código</th>
                            <th>Capacidad</th>
                            <th>Ubicación</th>
                            <th class="text-center">Acciones</th> </tr>
                    </thead>
                    <tbody>
                        {% for aula in aulas %}
                        <tr>
                            <td><strong>{{ aula.nombre }}</strong></td>
                            <td>{{ aula.capacidad }} personas</td>
                            <td>{{ aula.ubicacion }}</td>
                            <td class="text-center">
                                <a href="{% url 'editar_aula' aula.id %}" class="btn btn-warning btn-sm me-2">Editar</a>
                                <a href="{% url 'eliminar_aula' aula.id %}" class="btn btn-danger btn-sm" 
                                   onclick="return confirm('¿Seguro que quieres borrar esta aula?')">Eliminar</a>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="4" class="text-center text-muted py-4">No hay aulas registradas.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
