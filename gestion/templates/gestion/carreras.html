<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Carreras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-success fw-bold">Control de Carreras</h2>
        <div>
            <a href="/carreras/nueva/" class="btn btn-info text-white fw-bold shadow-sm">+ Registrar Carrera</a>
            <a href="/" class="btn btn-secondary fw-bold shadow-sm">← Volver al Inicio</a>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
                <tr>
                    <th class="ps-4">Clave</th>
                    <th>Nombre de la Carrera</th>
                    <th class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for c in carreras %}
                <tr>
                    <td class="ps-4 fw-bold">{{ c.clave }}</td>
                    <td>{{ c.nombre }}</td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-2">
                            <a href="/carreras/editar/{{ c.id }}/" 
                               class="btn btn-sm btn-warning fw-bold text-dark px-3 shadow-sm">
                               ✏️ Editar
                            </a>
                            
                            <a href="/carreras/eliminar/{{ c.id }}/" 
                               class="btn btn-sm btn-danger fw-bold text-white px-3 shadow-sm"
                               onclick="return confirm('¿Estás seguro de eliminar la carrera: {{ c.nombre }}?');">
                               🗑️ Eliminar
                            </a>
                        </div>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center py-4 text-muted">No hay carreras registradas.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
