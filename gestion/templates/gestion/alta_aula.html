<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% if aula %}Editar{% else %}Registrar{% endif %} Aula</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-dark fw-bold">{% if aula %}✏️ Editar Aula{% else %}➕ Registrar Aula{% endif %}</h2>
            <a href="/aulas/" class="btn btn-secondary">Cancelar</a>
        </div>
        <div class="card shadow-sm border-0 p-4">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Nombre del Aula</label>
                    <input type="text" name="nombre" class="form-control" required value="{{ aula.nombre|default:'' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Capacidad</label>
                    <input type="number" name="capacidad" class="form-control" required value="{{ aula.capacidad|default:'' }}">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Ubicación</label>
                    <input type="text" name="ubicacion" class="form-control" required value="{{ aula.ubicacion|default:'' }}">
                </div>
                <button type="submit" class="btn btn-info text-white w-100 fw-bold">Guardar Aula</button>
            </form>
        </div>
    </div>
</body>
</html>
